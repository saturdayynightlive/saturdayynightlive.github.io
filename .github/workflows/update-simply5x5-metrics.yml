name: Update Simply5x5 metrics

on:
  schedule:
    - cron: "17 2 1 * *"
  workflow_dispatch:
    inputs:
      downloads_total:
        description: "Manual total downloads, e.g. 1090 or 1.09K. Leave blank to use App Store Connect API."
        required: false
        type: string
      sessions_total:
        description: "Manual total app sessions, e.g. 7370 or 7.37K. Leave blank to use App Store Connect API."
        required: false
        type: string
      active_average_30d:
        description: "Manual average daily active users over the last 30 days. Leave blank to use API."
        required: false
        type: string
      as_of_date:
        description: "Manual metric date in YYYY-MM-DD. Optional."
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install App Store Connect API dependency
        run: python -m pip install "PyJWT[crypto]==2.10.1"

      - name: Update metrics
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          SIMPLY5X5_APP_ID: ${{ secrets.SIMPLY5X5_APP_ID }}
          ASC_CREATE_ANALYTICS_REQUEST: ${{ vars.ASC_CREATE_ANALYTICS_REQUEST || 'false' }}
          MANUAL_DOWNLOADS_TOTAL: ${{ github.event.inputs.downloads_total }}
          MANUAL_SESSIONS_TOTAL: ${{ github.event.inputs.sessions_total }}
          MANUAL_ACTIVE_AVERAGE_30D: ${{ github.event.inputs.active_average_30d }}
          MANUAL_AS_OF_DATE: ${{ github.event.inputs.as_of_date }}
        run: |
          if [ -n "$MANUAL_DOWNLOADS_TOTAL$MANUAL_SESSIONS_TOTAL$MANUAL_ACTIVE_AVERAGE_30D" ]; then
            args=(
              --set-downloads "$MANUAL_DOWNLOADS_TOTAL"
              --set-sessions "$MANUAL_SESSIONS_TOTAL"
              --set-active-average "$MANUAL_ACTIVE_AVERAGE_30D"
            )
            if [ -n "$MANUAL_AS_OF_DATE" ]; then
              args+=(--as-of-date "$MANUAL_AS_OF_DATE")
            fi
            python scripts/update_simply5x5_metrics.py "${args[@]}"
          else
            python scripts/update_simply5x5_metrics.py
          fi

      - name: Validate generated files
        run: |
          git diff --check
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlparse

          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = set()
                  self.hrefs = []
                  self.srcs = []

              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  if "id" in attrs:
                      self.ids.add(attrs["id"])
                  if tag == "a" and "href" in attrs:
                      self.hrefs.append(attrs["href"])
                  if tag == "img" and "src" in attrs:
                      self.srcs.append(attrs["src"])

          for filename in ["index.html", "projects/simply5x5.html"]:
              path = Path(filename)
              parser = Parser()
              parser.feed(path.read_text(encoding="utf-8"))
              for href in parser.hrefs:
                  if href.startswith("#") and href[1:] not in parser.ids:
                      raise SystemExit(f"{filename}: missing anchor {href}")
              for ref in parser.hrefs + parser.srcs:
                  parsed = urlparse(ref)
                  if parsed.scheme or ref.startswith("mailto:") or ref.startswith("#"):
                      continue
                  target = (path.parent / parsed.path).resolve()
                  if not target.exists():
                      raise SystemExit(f"{filename}: missing local ref {ref}")
          PY

      - name: Commit and push if metrics changed
        run: |
          if git diff --quiet; then
            echo "No Simply5x5 metric changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/simply5x5_metrics.json index.html projects/simply5x5.html
          git commit -m "Update Simply5x5 public metrics" \
            -m "Constraint: Automatically refresh public Simply5x5 aggregate metrics from App Store Connect reports." \
            -m "Rejected: Committing raw App Store Connect reports | only aggregate public metrics belong in the site repository." \
            -m "Confidence: medium" \
            -m "Scope-risk: narrow" \
            -m "Directive: Keep App Store Connect credentials in GitHub Secrets when API refresh is used; manual dispatch inputs are acceptable when account access is unavailable." \
            -m "Tested: scripts/update_simply5x5_metrics.py; git diff --check; static link validation." \
            -m "Not-tested: Manual App Store Connect dashboard comparison."
          git push
