<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="data:," />
  <title>Study Notes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --text: #191714;
      --muted: #6c675f;
      --border: #ded9ce;
      --accent: #2563eb;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    main {
      width: min(760px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      box-shadow: 0 16px 40px rgba(33, 29, 20, 0.08);
    }
    .top-link {
      display: inline-block;
      margin-bottom: 2rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .top-link:hover { color: var(--text); }
    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 5vw, 3rem);
      line-height: 1.05;
      letter-spacing: 0;
    }
    p {
      margin: 0.8rem 0 1.8rem;
      color: var(--muted);
      line-height: 1.7;
    }
    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.85rem;
    }
    .course-card {
      display: grid;
      gap: 0.45rem;
      min-height: 150px;
      padding: 1.2rem;
      color: inherit;
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fbfaf7;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    }
    .course-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.12);
    }
    .course-code {
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .course-card strong { font-size: 1.2rem; }
    .course-card small { color: var(--muted); line-height: 1.5; }
    @media (max-width: 520px) {
      body { padding: 1rem; }
      main { padding: 1.4rem; }
    }
  </style>
</head>
<body>
  <main>
    <a class="top-link" href="/">← Hwan Ji</a>
    <h1>과목 선택</h1>
    <p>열람할 과목 요약을 선택하세요.</p>
    <section class="course-grid" aria-label="Courses">
        <a class="course-card" href="computer-programming/summary/index.html">
          <span class="course-code">2026-1</span>
          <strong>컴퓨터프로그래밍</strong>
          <small>2026-1 Java/C++ 기말 요약</small>
        </a>
    </section>
  </main>
</body>
</html>
